<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter - Nazmul IT</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#000;
  color:#d1d5db;
}

/* HEADER */
.hero{
  text-align:center;
  padding:60px 20px;
  border-bottom:1px solid #222;
}

.hero h1{
  font-size:48px;
  color:#ff8800;
}

.hero p{
  color:#9ca3af;
}

/* TOOL AREA */
.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

textarea{
  width:100%;
  height:200px;
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  padding:15px;
  color:#d1d5db;
  font-size:14px;
  outline:none;
  margin-bottom:15px;
}

textarea:focus{
  border-color:#ff8800;
}

/* BUTTONS */
.btn{
  background:#ff8800;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  transition:0.3s;
  margin-right:10px;
}

.btn:hover{
  background:#ff7700;
}

/* OUTPUT */
.output{
  margin-top:20px;
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  padding:15px;
  white-space:pre-wrap;
  min-height:150px;
}

.error{
  color:#ff4d4d;
  margin-top:10px;
}
</style>
</head>

<body>

<header class="hero">
  <h1>JSON Formatter</h1>
  <p>Format and validate your JSON data</p>
</header>

<div class="container">

  <textarea id="input" placeholder='Paste JSON here...'></textarea>

  <button class="btn" onclick="formatJSON()">Format</button>
  <button class="btn" onclick="clearAll()">Clear</button>

  <div id="error" class="error"></div>

  <div class="output" id="output">Formatted JSON will appear here...</div>

</div>

<script>

function formatJSON(){

  let input = document.getElementById("input").value;
  let output = document.getElementById("output");
  let error = document.getElementById("error");

  try{
    let parsed = JSON.parse(input);
    let formatted = JSON.stringify(parsed, null, 4);

    output.textContent = formatted;
    error.textContent = "";
  }
  catch(e){
    error.textContent = "Invalid JSON format!";
    output.textContent = "";
  }
}

function clearAll(){
  document.getElementById("input").value = "";
  document.getElementById("output").textContent = "Formatted JSON will appear here...";
  document.getElementById("error").textContent = "";
}

</script>

</body>
</html>
