<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter - Nazmul IT</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#000;
  color:#d1d5db;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
  border-bottom:1px solid #222;
}

.hero h1{
  font-size:48px;
  color:#ff8800;
  margin-bottom:10px;
}

.hero p{
  color:#9ca3af;
}

/* TOOL AREA */
.tool-box{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:220px;
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  padding:15px;
  color:#d1d5db;
  font-size:16px;
  outline:none;
  transition:0.3s;
}

textarea:focus{
  border-color:#ff8800;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.btn{
  background:#ff8800;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  color:white;
  transition:0.3s;
  font-size:14px;
}

.btn:hover{
  background:#ff7700;
  transform:scale(1.05);
}

</style>
</head>

<body>

<header class="hero">
  <h1>Case Converter</h1>
  <p>Convert text into different formats instantly</p>
</header>

<section class="tool-box">

  <textarea id="text" placeholder="Type your text here..."></textarea>

  <div class="buttons">

    <button class="btn" onclick="toUpper()">UPPER</button>
    <button class="btn" onclick="toLower()">lower</button>
    <button class="btn" onclick="toTitle()">Title</button>
    <button class="btn" onclick="toSentence()">Sentence</button>

  </div>

</section>

<script>

/* TEXT AREA */
let t = document.getElementById("text");

/* UPPER CASE */
function toUpper(){
  t.value = t.value.toUpperCase();
}

/* LOWER CASE */
function toLower(){
  t.value = t.value.toLowerCase();
}

/* TITLE CASE */
function toTitle(){
  t.value = t.value
    .toLowerCase()
    .split(" ")
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
    .join(" ");
}

/* SENTENCE CASE */
function toSentence(){
  t.value = t.value
    .toLowerCase()
    .replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase());
}

</script>

</body>
</html>
