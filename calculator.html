<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator - Nazmul IT</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#000;
  color:#d1d5db;
}

/* HEADER */
.hero{
  text-align:center;
  padding:50px 20px;
  border-bottom:1px solid #222;
}

.hero h1{
  color:#ff8800;
  font-size:48px;
}

.hero p{
  color:#9ca3af;
}

/* CALCULATOR BOX */
.calculator{
  max-width:350px;
  margin:40px auto;
  background:#111;
  border:1px solid #222;
  border-radius:15px;
  padding:20px;
}

/* DISPLAY */
#display{
  width:100%;
  height:60px;
  background:#000;
  border:1px solid #222;
  border-radius:10px;
  color:#fff;
  font-size:24px;
  text-align:right;
  padding:10px;
  margin-bottom:15px;
}

/* BUTTON GRID */
.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#1f1f1f;
  color:#fff;
  transition:0.2s;
}

button:hover{
  background:#333;
}

/* SPECIAL BUTTONS */
.equal{
  background:#ff8800;
}

.equal:hover{
  background:#ff7700;
}

.clear{
  background:#ff3b3b;
}

.clear:hover{
  background:#e63232;
}
</style>
</head>

<body>

<header class="hero">
  <h1>Calculator</h1>
  <p>Simple & Fast Math Tool</p>
</header>

<div class="calculator">

  <input type="text" id="display" disabled>

  <div class="buttons">

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('/')">/</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('*')">*</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('-')">-</button>

    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="calculate()" class="equal">=</button>
    <button onclick="press('+')">+</button>

    <button onclick="clearDisplay()" class="clear" style="grid-column:span 4;">Clear</button>

  </div>

</div>

<script>

let display = document.getElementById("display");

function press(value){
  display.value += value;
}

function calculate(){
  try{
    display.value = eval(display.value);
  }
  catch{
    display.value = "Error";
  }
}

function clearDisplay(){
  display.value = "";
}

</script>

</body>
</html>
